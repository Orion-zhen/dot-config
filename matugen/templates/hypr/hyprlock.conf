# Generated by matugen
# template: ~/.config/matugen/tempates/hypr/hyprlock.conf

# 文本颜色保持高亮，确保无论背景如何都有足够清晰度
$text_color = rgba(240, 244, 248, 0.95)
$font_family_cn = LXGWWenKai Nerd Font
$font_family = Maple Mono NF

# ==========================================================
# 自适应毛玻璃背景材质 (Adaptive Glassmorphism)
# ==========================================================
background {
    monitor =
    path = screenshot
    blur_passes = 3          # 回归3次，保留空气感
    blur_size = 8
    noise = 0.0117
    contrast = 0.95          # 适中对比度
    brightness = 0.85        # 恢复透光，深色壁纸可见
    vibrancy = 0.25          # 提升色彩穿透力
    vibrancy_darkness = 0.10
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

auth {
    fingerprint {
        enabled = true
    }
}

# ==========================================================
# 最高悬浮层 (时间)
# ==========================================================
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M:%S")</span>"
    color = $text_color
    font_size = 100
    font_family = $font_family
    position = 0, 260
    halign = center
    valign = center

    # 柔和且具有穿透力的阴影
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.8) # 带有透明度，融入暗色背景
    shadow_boost = 1.2
}

# ==========================================================
# 紧贴背景层 (日期)
# ==========================================================
label {
    monitor =
    text = cmd[update:5000] date +'%B %d, %A'
    color = $text_color
    font_size = 25
    font_family = $font_family_cn
    position = 0, 160
    halign = center
    valign = center

    # 轻量边缘保护
    shadow_passes = 2
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.75)
    shadow_boost = 1.0
}

# ==========================================================
# 状态栏
# ==========================================================
label {
    monitor =
    text = cmd[update:2000] bash ~/.config/hypr/scripts/lock-status.sh
    color = $text_color
    font_size = 16
    font_family = $font_family
    position = 0, 90
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.75)
    shadow_boost = 1.0
}

# ==========================================================
# UI 实体卡片层一 (用户底框 Shape)
# ==========================================================
shape {
    monitor =
    size = 320, 80
    color = rgba(255, 255, 255, 0.15) 
    rounding = -1
    border_size = 0
    border_color = rgba({{colors.primary_container.default.hex_stripped}}FF) rgba({{colors.secondary_container.default.hex_stripped}}FF) 45deg
    rotate = 0
    xray = false

    position = 0, -100
    halign = center
    valign = center

    # 宽阔而轻柔的漫反射投影，暗色调下隐形，亮色调下托底
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 0.4) 
    shadow_boost = 0.8
}

# ==========================================================
# 卡片一承载物 (用户名文本)
# ==========================================================
label {
    monitor =
    text =   $USER
    color = $text_color
    font_size = 20
    font_family = $font_family
    position = 0, -100
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.0
}

# ==========================================================
# UI 实体卡片层二 (密码输入框)
# ==========================================================
input-field {
    monitor =
    size = 320, 80
    outline_thickness = 3
    inner_color = rgba({{colors.surface_container.default.hex_stripped}}1A)
    outer_color = rgba({{colors.primary_container.default.hex_stripped}}FF) rgba({{colors.secondary_container.default.hex_stripped}}FF) 45deg
    fail_color = rgba({{colors.error.default.hex_stripped}}FF) rgba({{colors.error_container.default.hex_stripped}}FF) 45deg
    capslock_color = rgba({{colors.tertiary_fixed.default.hex_stripped}}F0)

    placeholder_text = ヾ(＠^_^＠)ノ
    fail_text = ( >﹏<。)～
    font_family = $font_family
    font_color = rgba({{colors.on_surface.default.hex_stripped}}FF)
    fade_on_empty = false
    
    dots_size = 0.2 
    dots_spacing = 0.2 
    dots_center = true
    position = 0, -200
    halign = center
    valign = center

    # 与上方Shape完全一致的投影参数
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 0.4)
    shadow_boost = 0.8
}

# ==========================================================
# 紧贴背景层 (底部系统状态)
# ==========================================================
label {
    monitor =
    text = cmd[update:60000] echo "󰣇 $(uname -r)  |  󰔚 $(uptime -p | sed 's/up //')"
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = 0, 50
    halign = center
    valign = bottom

    shadow_passes = 2
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.75)
    shadow_boost = 1.0
}